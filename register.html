<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SCNMMS | Create Account</title>


<style>

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:#00111f;

font-family:Segoe UI;

color:white;

}


.box{

width:380px;

padding:30px;

background:#002033;

border-radius:20px;

border:1px solid #00eaff;

box-shadow:0 0 20px #00eaff;

}



h1{

text-align:center;

color:#00eaff;

}


input,select{

width:100%;

padding:12px;

margin:10px 0;

background:#00111f;

border:1px solid #00eaff;

border-radius:8px;

color:white;

}



button{

width:100%;

padding:12px;

border:none;

border-radius:20px;

background:#00eaff;

font-weight:bold;

cursor:pointer;

}



a{

color:#00eaff;

}



</style>

</head>



<body>


<div class="box">


<h1>
Create Account
</h1>



<input 
id="fullname"
placeholder="Full Name">



<input 
id="username"
placeholder="Username">



<input 
id="password"
type="password"
placeholder="Password">



<select id="role">


<option value="Network Administrator">

Network Administrator

</option>


<option value="Network Technician">

Network Technician

</option>


</select>




<button onclick="register()">

Create Account

</button>



<br><br>


<center>

<a href="index.html">

Back to Login

</a>

</center>


</div>



<script src="register.js"></script>


</body>

</html>
