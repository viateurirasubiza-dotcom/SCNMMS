<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NET VIATEUR SYSTEM - Smart Campus Network Monitoring and Management System for monitoring campus network devices, alerts and reports">

<meta name="keywords" content="NET VIATEUR SYSTEM, SCNMMS, Network Monitoring System, Campus Network, Smart Campus, Network Management">

<meta name="author" content="Viateur Irasubiza">

<meta property="og:title" content="NET VIATEUR SYSTEM | Smart Campus Network Monitoring System">

<meta property="og:description" content="NET VIATEUR SYSTEM helps monitor and manage campus network devices, alerts and network performance in real time">

<meta property="og:type" content="website">

<meta property="og:site_name" content="NET VIATEUR SYSTEM">
    <meta name="application-name" content="NET VIATEUR SYSTEM">

<meta name="apple-mobile-web-app-title" content="NET VIATEUR SYSTEM">
    <link rel="icon" href="favicon.ico">

<link rel="manifest" href="manifest.json">


<meta name="theme-color" content="#00eaff">

<title>
NET VIATEUR SYSTEM | Smart Campus Network Monitoring
</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}


body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:flex-start;

    padding:30px 0;

    background:
    radial-gradient(circle at top,#003b66,#00111f);

    overflow-y:auto;

}

/* Animated network background */

body::before{

    content:"";
    position:absolute;

    width:600px;
    height:600px;

    background:
    linear-gradient(
        45deg,
        transparent,
        #00eaff,
        transparent
    );

    animation:rotate 10s linear infinite;

    opacity:0.15;
}
.login-box::-webkit-scrollbar{

    width:8px;

}


.login-box::-webkit-scrollbar-track{

    background:transparent;

}


.login-box::-webkit-scrollbar-thumb{

    background:#00eaff;

    border-radius:10px;

}

@keyframes rotate{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }

}


/* Login Card */

.login-box{

    width:380px;

    max-width:95%;

    max-height:90vh;

    overflow-y:auto;

    padding:35px;

    background:
    rgba(255,255,255,0.08);

    backdrop-filter:blur(15px);

    border-radius:20px;

    border:1px solid rgba(0,234,255,0.4);

    box-shadow:
    0 0 25px #00eaff;

    color:white;

    text-align:center;

    position:relative;

}
@media(max-width:500px){

.login-box{

width:90%;

padding:25px;

}


.logo{

font-size:45px;

}


h1{

font-size:25px;

}

}

/* Logo */

.logo{

    font-size:60px;

    margin-bottom:10px;

}


h1{

    color:#00eaff;

    letter-spacing:3px;

}


p{

    font-size:14px;

    margin:15px 0 25px;

    color:#ddd;

}



/* Inputs */

.input-group{

    text-align:left;

    margin-bottom:20px;

}


label{

    display:block;

    margin-bottom:7px;

    color:#00eaff;

}


input,
select{

    width:100%;

    padding:12px;

    border:none;

    outline:none;

    border-radius:8px;

    background:#001b2e;

    color:white;

    border:1px solid #00eaff;

}



button{

    width:100%;

    padding:13px;

    margin-top:10px;

    border:none;

    border-radius:25px;

    background:#00eaff;

    color:#00111f;

    font-weight:bold;

    cursor:pointer;

    font-size:16px;

    transition:.3s;

}


button:hover{

    background:white;

    box-shadow:0 0 20px #00eaff;

}


.footer{

    margin-top:25px;

    font-size:12px;

    color:#aaa;

}
a{
    color:#00eaff;
    text-decoration:none;
    font-weight:bold;
}


a:hover{
    color:white;
    text-shadow:0 0 10px #00eaff;
}

</style>

</head>


<body>


<div class="login-box">


<div class="logo">
🌐
</div>


<h1>
SCNMMS
</h1>


<p>
Smart Campus Network Monitoring
<br>
and Management System
</p>



<form onsubmit="event.preventDefault(); login();">


<div class="input-group">

<label>
Username
</label>

<input 
id="username"
type="text"
placeholder="Enter username">


</div>



<div class="input-group">

<label>
Password
</label>

<input 
id="password"
type="password"
placeholder="Enter password">

</div>



<div class="input-group">

<label>
Role
</label>


<select id="role">

<option>
Network Administrator
</option>

<option>
Network Technician
</option>


</select>


</div>



<button type="submit">
LOGIN
</button>
    </form>
<p>

Don't have account?

<a href="/SCNMMS/register.html">

Create Account

</a>

</p>
   
<a href="./forgot_password.html">

Forgot Password?

</a>





<div class="footer">

© 2026 Smart Campus Network System

</div>


</div>


        <script src="app.js"></script>
</body>

</html>
