<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SCNMMS | Devices</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}


body{

background:#00111f;
color:white;

}


/* Header */

.header{

padding:25px;

background:#001b2e;

border-bottom:1px solid #00eaff;

display:flex;

justify-content:space-between;

align-items:center;

}


.header h1{

color:#00eaff;

}



.back{

color:white;

text-decoration:none;

background:#00eaff;

color:#00111f;

padding:10px 20px;

border-radius:20px;

}



/* Container */


.container{

padding:30px;

}



/* Add Device Box */


.box{

background:#002033;

padding:25px;

border-radius:15px;

border:1px solid #00445f;

margin-bottom:30px;

}



.box h2{

color:#00eaff;

margin-bottom:20px;

}




.form{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:15px;

}



input,select{


padding:12px;

background:#00111f;

border:1px solid #00eaff;

border-radius:8px;

color:white;

}




button{

padding:12px;

background:#00eaff;

border:none;

border-radius:20px;

font-weight:bold;

cursor:pointer;

}



button:hover{

background:white;

}





/* Table */


table{

width:100%;

border-collapse:collapse;

margin-top:20px;

}



th{

background:#003b55;

color:#00eaff;

}



th,td{

padding:15px;

border-bottom:1px solid #00445f;

text-align:center;

}




.online{

color:#00ff88;

}


.offline{

color:red;

}



.delete{

background:red;

color:white;

padding:7px 15px;

border-radius:15px;

}




/* Search */


.search{

width:300px;

margin-bottom:20px;

}



</style>


</head>



<body>




<div class="header">


<h1>
🖥 Network Devices Management
</h1>



<a class="back" href="dashboard.html">
Dashboard
</a>


</div>





<div class="container">





<div class="box">


<h2>
➕ Add New Device
</h2>



<div class="form">

<input id="deviceName" type="text" placeholder="Device Name">

<input id="ipAddress" type="text" placeholder="IP Address">
  <input id="macAddress" type="text" placeholder="MAC Address">
<select id="deviceType">

<option>
Router
</option>

<option>
Switch
</option>

<option>
Access Point
</option>

<option>
Server
</option>

<option>
Computer
</option>

</select>



    <input id="building" type="text" placeholder="Building">
    <input id="room" type="text" placeholder="Room">





<button onclick="addDevice()">
Add Device
</button>


</div>


</div>








<div class="box">


<h2>
📡 Registered Devices
</h2>


<input 
class="search"
type="text"
placeholder="Search Device">





<table>


<tr>

<th>
Name
</th>

<th>
IP Address
</th>


<th>
MAC Address
</th>


<th>
Type
</th>


<th>
Location
</th>


<th>
Status
</th>


<th>
Action
</th>


</tr>




<tr>

<td>
Main Router
</td>

<td>
192.168.1.1
</td>


<td>
AA:BB:CC:11
</td>


<td>
Router
</td>


<td>
ICT Building
</td>


<td class="online">
Online
</td>


<td>

<button class="delete">
Delete
</button>

</td>


</tr>





<tr>

<td>
Switch Lab 01
</td>

<td>
192.168.1.10
</td>


<td>
AA:BB:CC:22
</td>


<td>
Switch
</td>


<td>
Computer Lab
</td>


<td class="offline">
Offline
</td>


<td>

<button class="delete">
Delete
</button>

</td>


</tr>






</table>



</div>






</div>





</body>

</html>
