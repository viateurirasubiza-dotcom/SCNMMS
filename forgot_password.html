<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SCNMMS | Forgot Password</title>


<style>

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:#00111f;

font-family:Segoe UI;

color:white;

}


.box{

width:380px;

padding:30px;

background:#002033;

border-radius:20px;

border:1px solid #00eaff;

box-shadow:0 0 20px #00eaff;

}



h1{

text-align:center;

color:#00eaff;

}


input{

width:100%;

padding:12px;

margin:10px 0;

background:#00111f;

color:white;

border:1px solid #00eaff;

border-radius:8px;

}



button{

width:100%;

padding:12px;

background:#00eaff;

border:none;

border-radius:20px;

font-weight:bold;

cursor:pointer;

}



a{

color:#00eaff;

}

</style>

</head>



<body>


<div class="box">


<h1>
Forgot Password
</h1>


<input
id="username"
placeholder="Enter Username">



<input
id="newPassword"
type="password"
placeholder="New Password">



<button onclick="resetPassword()">

Reset Password

</button>



<br><br>


<center>

<a href="index.html">
Back to Login
</a>

</center>



</div>



<script src="forgot.js"></script>


</body>

</html>
