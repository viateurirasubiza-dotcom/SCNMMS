<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SCNMMS | Network Topology</title>


<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;

}


body{

background:#00111f;

color:white;

min-height:100vh;

}


/* Header */

.header{

padding:25px;

background:#001b2e;

border-bottom:1px solid #00eaff;

display:flex;

justify-content:space-between;

align-items:center;

}


.header h1{

color:#00eaff;

}



.back{

text-decoration:none;

background:#00eaff;

color:#00111f;

padding:10px 20px;

border-radius:20px;

}




/* Topology Area */

.network{

position:relative;

height:650px;

margin:40px;

background:

radial-gradient(circle,#003b55,#00111f);

border:1px solid #00445f;

border-radius:20px;

}



/* Nodes */


.node{

position:absolute;

width:130px;

height:80px;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

background:#002033;

border:2px solid #00eaff;

border-radius:15px;

box-shadow:0 0 20px #00eaff;

font-weight:bold;

}



.icon{

font-size:30px;

}



/* Positions */


.internet{

top:40px;

left:45%;

}



.router{

top:180px;

left:45%;

}



.switch1{

top:340px;

left:25%;

}



.switch2{

top:340px;

right:25%;

}



.server{

top:500px;

left:45%;

}



.pc{

top:500px;

left:15%;

}




/* Connections */


.line{

position:absolute;

background:#00eaff;

height:3px;

transform-origin:left;

animation:pulse 1.5s infinite;

}




@keyframes pulse{


0%{

opacity:.3;

}


50%{

opacity:1;

}


100%{

opacity:.3;

}



}




.line1{

width:140px;

top:150px;

left:48%;

transform:rotate(90deg);

}



.line2{

width:180px;

top:300px;

left:45%;

transform:rotate(160deg);

}



.line3{

width:180px;

top:300px;

left:50%;

transform:rotate(20deg);

}



.line4{

width:160px;

top:450px;

left:30%;

transform:rotate(45deg);

}



.line5{

width:160px;

top:450px;

left:50%;

transform:rotate(135deg);

}



.info{

margin:30px;

padding:20px;

background:#002033;

border-radius:15px;

border:1px solid #00445f;

}



.info h2{

color:#00eaff;

}


</style>

</head>



<body>



<div class="header">


<h1>
🌐 Network Topology Map
</h1>


<a class="back" href="dashboard.html">
Dashboard
</a>


</div>






<div class="network">



<div class="node internet">

<div class="icon">
🌍
</div>

Internet

</div>




<div class="node router">

<div class="icon">
📡
</div>

Router

</div>





<div class="node switch1">

<div class="icon">
🔀
</div>

Switch Lab

</div>





<div class="node switch2">

<div class="icon">
🔀
</div>

Switch Admin

</div>





<div class="node server">

<div class="icon">
🖥
</div>

Server

</div>





<div class="node pc">

<div class="icon">
💻
</div>

Computers

</div>






<div class="line line1"></div>

<div class="line line2"></div>

<div class="line line3"></div>

<div class="line line4"></div>

<div class="line line5"></div>




</div>







<div class="info">

<h2>
Network Structure
</h2>

<br>

<p>
🌍 Internet → 📡 Router → 🔀 Switches → 💻 Computers / 🖥 Servers
</p>

<br>

<p>
Status: <span style="color:#00ff88">
All Core Devices Connected
</span>
</p>


</div>




</body>

</html>
